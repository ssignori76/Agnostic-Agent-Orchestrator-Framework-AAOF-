# docker-compose.dev.yml — Development Override Template
#
# Purpose: Development-specific overrides. Source code is mounted as a volume
#          for hot-reload. Additional debug ports are exposed.
# Usage:   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Note:    This file overrides docker-compose.yml for development only.
#          Never use this file in production.

services:

  # ─── API Service (dev override) ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ${PROJECT_NAME}-api:dev
    volumes:
      - ./src:/app/src               # Mount source code for hot-reload
      - /app/node_modules            # Exclude node_modules from mount (use container's)
    ports:
      - "${API_PORT:-3000}:3000"
      - "9229:9229"                  # Node.js debugger port
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    command: ["npm", "run", "dev"]   # Hot-reload dev command

  # ─── Database (dev override) ──────────────────────────────────────────────
  db:
    ports:
      - "5432:5432"                  # Expose DB port locally for tools (DBeaver, etc.)
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql  # Dev seed data
