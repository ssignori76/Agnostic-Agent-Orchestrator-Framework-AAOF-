apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-project-dev

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

# Add common labels to all resources
commonLabels:
  app.kubernetes.io/managed-by: aaof
  environment: dev

# Image tag overrides (update per environment)
images:
  - name: my-project-api
    newTag: "1.0.0"
